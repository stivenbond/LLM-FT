# LoRA Configuration for Teacher Diary Generator
# Based on Gemma 4:e4b

model_name_or_path: "google/gemma-4-1b-it"
load_in_4bit: true

lora:
  r: 32                        # Increased rank for flexible JSON structure
  lora_alpha: 64
  lora_dropout: 0.1
  bias: "none"
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
    - "gate_proj"              # Added more targets for better generation quality
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"
